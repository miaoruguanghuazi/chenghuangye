<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="祈请文生成器 — 选择二十一司自动生成对应祈请文，一键复制。">
  <title>祈请文生成 · 城隍法脉</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#F5F0EB">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');
    .generator-form { max-width:600px; margin: 0 auto var(--space-lg); }
    .generator-form label { display: block; margin-bottom: 0.3rem; font-size: 0.9rem; color: var(--text); }
    .generator-form select, .generator-form input, .generator-form textarea {
      width: 100%; padding: 0.6rem 0.8rem; margin-bottom: var(--space-sm);
      border: 1px solid var(--border); border-radius: var(--radius);
      font-family: var(--font-sans); font-size: 0.9rem; background: var(--bg-card);
      color: var(--text);
    }
    .generator-form textarea { min-height: 80px; resize: vertical; }
    .generator-form .btn { margin-top: var(--space-xs); }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-brand">城隍<span>法脉</span></a>
      <button class="nav-toggle">☰</button>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="all-si.html">二十一司</a></li>
        <li><a href="about.html">认识法脉</a></li>
        <li><a href="protect-youth.html">护青公益</a></li>
        <li><a href="rituals.html">功课仪轨</a></li>
        <li><a href="prayer-generator.html" class="active">祈请文</a></li>
        <li><a href="contact.html">关于</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="container">
      <div class="page-header fade-in">
        <h1>祈请文生成器</h1>
        <p>选择司号 · 输入姓名 · 自动生成 · 一键复制</p>
      </div>

      <div class="generator-form">
        <label for="si-select">① 选择司署</label>
        <select id="si-select">
          <option value="">— 请选择 —</option>
        </select>

        <label for="prayer-name">② 您的姓名（或法号）</label>
        <input type="text" id="prayer-name" placeholder="例：张三 / 妙如" value="弟子___">

        <div style="display:flex;gap:var(--space-sm)">
          <button class="btn btn-gold" onclick="generatePrayer()" style="flex:1">🙏 生成祈请文</button>
          <button class="btn btn-outline" onclick="resetForm()">重置</button>
        </div>
      </div>

      <div id="prayer-result" style="display:none">
        <div class="card card-gold">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-sm);flex-wrap:wrap;gap:0.5rem">
            <h3 class="section-title" style="border:none;margin:0;padding:0" id="result-title">祈请文</h3>
            <button class="copy-btn" id="copy-result">📋 复制</button>
          </div>
          <div class="prayer-text" id="result-text" style="line-height:2.2;white-space:pre-wrap"></div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-brand">城隍法脉 · 二十一司护法系统</div>
    <div class="footer-oath">冥阳苦未尽 · 誓不成佛道 · 十方若有苦 · 寻声必救度</div>
    <p>纯公益平台 · 不收取任何费用 · 不替代医疗诊断与治疗</p>
  </footer>

  <button class="back-top">↑</button>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script>
    // 填充司选择器
    var sel = document.getElementById('si-select');
    SIXI_DATA.forEach(function(si) {
      var opt = document.createElement('option');
      opt.value = si.id;
      opt.textContent = '第' + (si.id < 10 ? '0' : '') + si.id + '司 · ' + si.name + ' — ' + si.keyword;
      sel.appendChild(opt);
    });

    function generatePrayer() {
      var id = parseInt(document.getElementById('si-select').value);
      var name = document.getElementById('prayer-name').value.trim() || '弟子___';
      var si = SIXI_DATA.find(function(s) { return s.id === id; });
      if (!si) { alert('请先选择司署'); return; }

      var gods = si.god1 + (si.god2 ? '、' + si.god2 : '');
      var text = name + '，一心顶礼。\n\n' +
        '愿以此心，代佛行化；愿以此身，代当境城隍、土地、山神及家宅六神护佑一方。\n\n' +
        '冥阳苦未尽，誓不成佛道；十方若有苦，寻声必救度。\n\n' +
        '今发正心正念，恭请城隍法脉二十一司护法，慈悲降临，威光护持。\n\n' +
        '特请：' + gods + '\n\n' +
        '伏愿' + si.funcs.join('，') + '。\n' +
        '令弟子及一切众生，远离' + si.name + '相关之苦，身心安泰。\n\n' +
        '恭请' + si.name + '护法慈悲加持，护持弟子' + si.funcs.slice(0, 2).join('，') + '，\n' +
        '令' + si.keyword + '调和，内外清净。\n\n' +
        '南无' + si.name + '护法菩萨（三遍）\n\n' +
        '愿以此祈请' + si.name + '功德，回向尽虚空遍法界一切众生，\n' +
        '愿众生远离' + si.name + '诸苦，身心康宁[合十]\n\n' +
        '【恭请鉴察】\n' +
        '南无幽冥教主地藏王菩萨\n' +
        '南无护法韦驮尊天菩萨\n' +
        '当境城隍尊神、土地正神、' + si.name + '护法鉴察\n' +
        name + '顶礼 🙏🙏🙏';

      document.getElementById('result-title').textContent = '第' + (si.id < 10 ? '0' : '') + si.id + '司 · ' + si.name + '祈请文';
      document.getElementById('result-text').textContent = text;
      document.getElementById('prayer-result').style.display = 'block';

      document.getElementById('copy-result').onclick = function() {
        copyText(text, document.getElementById('copy-result'));
      };
    }

    function resetForm() {
      document.getElementById('si-select').value = '';
      document.getElementById('prayer-name').value = '弟子___';
      document.getElementById('prayer-result').style.display = 'none';
    }

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
  </script>
</body>
</html>
