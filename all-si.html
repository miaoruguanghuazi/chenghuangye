</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-brand">城隍<span>法脉</span></a>
      <button class="nav-toggle">☰</button>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>

        <li><a href="contact.html">关于</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="container">
      <div class="page-header fade-in">
        <h1>二十一司护法系统</h1>
        <p>一司一职 · 各司其职 · 护佑冥阳两界</p>
      </div>

      <div class="banner-dharma" style="margin-bottom:var(--space-lg)">
        <div class="oath" style="font-size:1.2rem">稽首城隍 威灵显赫<br>护国佑民 善恶昭彰</div>
      </div>

      <div class="si-grid" id="si-grid"></div>

      <div class="divider">☸ ☸ ☸</div>

      <div style="text-align:center;padding:var(--space-lg) 0;max-width:600px;margin:0 auto">
        <p style="color:var(--text-light);font-size:0.9rem;line-height:2">
          二十一司各司其职，护持众生身心康宁。<br>
          每司有主司正神与副使，各领风骚，各护一方。<br>
          点击司名可查看详细职能、适用场景、养护要点及完整祈请文。
        </p>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-brand">城隍法脉 · 二十一司护法系统</div>
    <div class="footer-oath">冥阳苦未尽 · 誓不成佛道 · 十方若有苦 · 寻声必救度</div>
    <p>纯公益平台 · 不收取任何费用 · 不替代医疗诊断与治疗</p>
  </footer>

  <button class="back-top">↑</button>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script>
    var grid = document.getElementById('si-grid');
    if (grid) {
      var html = '';
      SIXI_DATA.forEach(function(si) {
        var num = (si.id < 10 ? '0' : '') + si.id;
        var gods = si.god1 + (si.god2 ? ' · ' + si.god2 : '');
        html += '<a href="pages/' + encodeURIComponent(si.name) + '.html" class="si-card">' +
          '<div class="si-number">第' + num + '司</div>' +
          '<div class="si-name">' + si.name + '</div>' +
          '<div class="si-sub">' + si.keyword + '</div>' +
          '<div class="si-gods">' + gods + '</div>' +
        '</a>';
      });
      grid.innerHTML = html;
    }
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
  </script>
</body>
</html>
